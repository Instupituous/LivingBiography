<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Concert Story – Living Biography</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="page story-page">

    <!-- HERO IMAGE -->
    <div class="hero-wrapper">
      <img id="hero-image" class="hero-image" src="">
    </div>

    <!-- TITLE BLOCK -->
    <div class="story-header">
      <h1 id="artist" class="story-artist"></h1>
      <h2 id="tour" class="story-tour"></h2>

      <div id="supporting-acts" class="story-supporting"></div>

      <div class="story-meta">
        <span id="date"></span>
        <span id="venue"></span>
        <span id="city"></span>
        <span id="time"></span>
      </div>
    </div>

    <!-- NOTES -->
    <div class="story-notes">
      <h3>Notes</h3>
      <p id="notes"></p>
    </div>

    <!-- PHOTO GALLERY -->
    <div class="story-gallery">
      <h3>Gallery</h3>
      <div id="gallery-grid" class="gallery-grid"></div>
    </div>

    <a href="../timeline.html" class="back-link">← Back to Timeline</a>

  </div>

  <script src="../js/story-concert.js"></script>
</body>
</html>
