<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Concert Story — Living Biography</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Georgia, serif;
        margin: 0;
        padding: 0;
        background: #fafafa;
        color: #111;
        line-height: 1.6;
    }

    /* Full-bleed hero image */
    #heroImage {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Divider under hero */
    .divider {
        width: 100%;
        height: 1px;
        background: #ddd;
        margin: 24px 0;
    }

    /* Centered editorial column */
    .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 20px 40px 20px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 4px;
        font-weight: 600;
    }

    .meta {
        font-size: 16px;
        margin-bottom: 24px;
        color: #444;
    }

    .meta div {
        margin-bottom: 4px;
    }

    h2 {
        font-size: 22px;
        margin-top: 32px;
        margin-bottom: 12px;
        font-weight: 600;
        border-bottom: 1px solid #ddd;
        padding-bottom: 4px;
    }

    h3 {
        font-size: 20px;
        margin-top: 20px;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .notes {
        white-space: pre-wrap;
        margin-top: 12px;
        font-size: 18px;
    }

    .photo-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
    }

    .photo-grid img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    .supporting-act-block {
        margin-bottom: 24px;
    }

    .accompaniment-block {
        margin-top: 12px;
        white-space: pre-wrap;
        font-size: 18px;
    }

    .back-link {
        display: inline-block;
        margin-top: 40px;
        font-size: 16px;
        color: #333;
        text-decoration: underline;
    }
</style>
</head>

<body>

<!-- HERO IMAGE -->
<img id="heroImage" src="" alt="Hero Photo">

<div class="divider"></div>

<div class="container">

    <!-- TITLE -->
    <h1 id="artistName"></h1>

    <!-- METADATA -->
    <div class="meta">
        <div id="dateField"></div>
        <div id="venueField"></div>
        <div id="locationField"></div>
        <div id="ratingField"></div>
        <div id="tagsField"></div>
    </div>

    <!-- ACCOMPANIMENT -->
    <h2>Accompaniment</h2>
    <div id="accompanimentField" class="accompaniment-block"></div>

    <!-- NOTES -->
    <h2>Notes</h2>
    <div id="notesField" class="notes"></div>

    <!-- HEADLINER PHOTOS -->
    <h2>Headliner Photos</h2>
    <div id="headlinerPhotos" class="photo-grid"></div>

    <!-- SUPPORTING ACTS -->
    <h2>Supporting Acts</h2>
    <div id="supportingActsContainer"></div>

    <!-- OTHER PHOTOS -->
    <h2>Other Photos</h2>
    <div id="otherPhotos" class="photo-grid"></div>

    <!-- BACK LINK -->
    <a href="../index.html" class="back-link">← Back to Timeline</a>

</div>

<script src="../js/story-concert.js"></script>

</body>
</html>
