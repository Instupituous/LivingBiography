<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Concert — Living Biography</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Georgia, serif;
        margin: 0;
        padding: 0;
        background: #fafafa;
        color: #111;
        line-height: 1.5;
    }

    /* Centered editorial column */
    .container {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 20px 60px 20px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 16px;
        font-weight: 600;
    }

    h2 {
        font-size: 20px;
        margin-top: 32px;
        margin-bottom: 8px;
        font-weight: 600;
        border-bottom: 1px solid #ddd;
        padding-bottom: 4px;
    }

    label {
        display: block;
        margin-top: 16px;
        font-weight: 600;
        font-size: 15px;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: Georgia, serif;
        font-size: 16px;
        background: #fff;
    }

    textarea {
        min-height: 120px;
    }

    /* Full-width rating slider */
    input[type="range"] {
        width: 100%;
        margin-top: 12px;
    }

    #ratingValue {
        font-size: 16px;
        margin-top: 6px;
        font-weight: 600;
    }

    .supporting-act {
        margin-top: 16px;
        padding: 12px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 4px;
    }

    .photo-preview {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .photo-preview img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #ccc;
        position: relative;
    }

    .hero-selected {
        border: 2px solid #000 !important;
    }

    .hero-selected::after {
        content: "🤘";
        position: absolute;
        top: 4px;
        left: 4px;
        font-size: 20px;
    }

    button {
        margin-top: 24px;
        width: 100%;
        padding: 14px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 4px;
        background: #111;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #333;
    }

    #addActBtn {
        background: #444;
        margin-top: 12px;
    }

    #heroNotice {
        font-size: 15px;
        color: #a00;
        margin-top: 8px;
        display: none;
    }
</style>
</head>

<body>

<div class="container">

<h1>Add Concert</h1>

<form id="concertForm">

    <h2>Concert Details</h2>

    <label>Artist</label>
    <input type="text" id="artist">

    <label>Date</label>
    <input type="date" id="date">

    <label>Venue</label>
    <input type="text" id="venue">

    <label>Location</label>
    <select id="locationSelect">
        <option value="">Select a location…</option>
        <option value="Nashville,TN">Nashville, TN</option>
        <option value="Franklin,TN">Franklin, TN</option>
        <option value="Nolensville,TN">Nolensville, TN</option>
        <option value="Murfreesboro,TN">Murfreesboro, TN</option>
        <option value="Huntsville,AL">Huntsville, AL</option>
        <option value="Louisville,KY">Louisville, KY</option>
        <option value="Atlanta,GA">Atlanta, GA</option>
        <option value="New York,NY">New York, NY</option>
        <option value="Huntington,NY">Huntington, NY</option>
        <option value="other">Other…</option>
    </select>

    <div id="manualLocation" style="display:none;">
        <label>Enter City, State</label>
        <input type="text" id="manualCityState" placeholder="Example: Denver, CO">
    </div>

    <h2>Headliner Photos</h2>
    <input type="file" id="headlinerPhotos" accept="image/*" multiple>
    <div id="headlinerPreview" class="photo-preview"></div>

    <h2>Supporting Acts</h2>
    <div id="supportingActsContainer"></div>
    <button type="button" id="addActBtn">Add Supporting Act</button>

    <h2>Other Photos</h2>
    <input type="file" id="otherPhotos" accept="image/*" multiple>
    <div id="otherPreview" class="photo-preview"></div>

    <h2>Hero Photo (Required)</h2>
    <p style="font-size:14px; color:#555; margin-top:-4px;">
        Tap any uploaded photo (headliner, supporting act, or other) to set it as the hero.
    </p>
    <div id="heroNotice">Please select a hero photo 🤘</div>

    <h2>Accompaniment</h2>
    <textarea id="accompaniment" placeholder="One name per line"></textarea>

    <h2>Notes</h2>
    <textarea id="notes" placeholder="Write your thoughts…"></textarea>

    <h2>Tags</h2>
    <input type="text" id="tags" placeholder="rock, live, 2024">

    <h2>Rating (1–10)</h2>
    <input type="range" id="rating" min="1" max="10" value="7">
    <div id="ratingValue">7 / 10</div>

    <button type="submit">Save Entry</button>

</form>

</div>

<script src="../js/entry-concert.js"></script>

</body>
</html>
