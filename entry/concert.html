<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Concert — Living Biography</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Georgia, serif;
        margin: 0;
        padding: 24px;
        line-height: 1.5;
        color: #111;
        background: #fafafa;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 8px;
        font-weight: 600;
    }

    h2 {
        font-size: 20px;
        margin-top: 32px;
        margin-bottom: 8px;
        font-weight: 600;
        border-bottom: 1px solid #ddd;
        padding-bottom: 4px;
    }

    label {
        display: block;
        margin-top: 16px;
        font-weight: 600;
        font-size: 15px;
    }

    input[type="text"],
    input[type="date"],
    textarea {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: Georgia, serif;
        font-size: 16px;
        background: #fff;
    }

    textarea {
        min-height: 120px;
    }

    .supporting-act {
        margin-top: 16px;
        padding: 12px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 4px;
    }

    .photo-preview {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .photo-preview img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 24px;
        width: 100%;
        padding: 14px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 4px;
        background: #111;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #333;
    }

    #addActBtn {
        background: #444;
        margin-top: 12px;
    }
</style>
</head>

<body>

<h1>Add Concert</h1>

<form id="concertForm">

    <h2>Concert Details</h2>

    <label>Artist</label>
    <input type="text" id="artist">

    <label>Date</label>
    <input type="date" id="date">

    <label>Venue</label>
    <input type="text" id="venue">

    <label>City</label>
    <input type="text" id="city">

    <label>State</label>
    <input type="text" id="state">

    <label>Country</label>
    <input type="text" id="country">

    <h2>Supporting Acts</h2>
    <div id="supportingActsContainer"></div>
    <button type="button" id="addActBtn">Add Supporting Act</button>

    <h2>Hero Photo (Required)</h2>
    <input type="file" id="heroPhoto" accept="image/*">
    <div id="heroPreview" class="photo-preview"></div>

    <h2>Other Photos</h2>
    <input type="file" id="otherPhotos" accept="image/*" multiple>
    <div id="otherPreview" class="photo-preview"></div>

    <h2>Notes</h2>
    <textarea id="notes" placeholder="Write your thoughts…"></textarea>

    <h2>Tags</h2>
    <input type="text" id="tags" placeholder="rock, live, 2024">

    <h2>Rating (1–10)</h2>
    <input type="range" id="rating" min="1" max="10" value="7">

    <button type="submit">Save Entry</button>

</form>

<script src="../js/entry-concert.js"></script>

</body>
</html>
